# redirects.conf — Redirecciones 301 desde URLs de WordPress
# Completado en Fase 15

# Posts migrados al nuevo blog
location = /2026/05/24/como-responder-resenas-de-google-automaticamente-sin-perder-tiempo/ {
    return 301 /blog/responder-resenas-google.html;
}

location = /2026/05/24/citas-peluqueria-whatsapp-automatico/ {
    return 301 /blog/citas-peluqueria-whatsapp.html;
}

# Bloquear acceso a rutas de WordPress (ya no existen, evitar 500/crawl)
location ^~ /wp-admin {
    return 301 /;
}

location = /wp-login.php {
    return 301 /;
}

location ^~ /wp-content {
    return 404;
}

location ^~ /wp-includes {
    return 404;
}

