# nginx.conf — Nerego Studio
# Configuración completa en Fase 12 y Fase 15
# Este archivo es un esqueleto inicial

server {
    listen 80;
    listen [::]:80;
    server_name neregostudio.com www.neregostudio.com;

    # Redirigir HTTP → HTTPS (Easypanel gestiona el SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neregostudio.com www.neregostudio.com;

    root /usr/share/nginx/html;
    index index.html;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache para assets estáticos
    location ~* \.(css|js|woff2|woff|ttf|svg|png|jpg|jpeg|webp|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sin caché para HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Incluir redirecciones 301 desde WordPress
    include /etc/nginx/conf.d/redirects.conf;

    # Página principal
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Página 404 personalizada (pendiente crear)
    # error_page 404 /404.html;

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;
}
